<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tela de Lo`gin</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: linear-gradient(to right, #150b2b, #0100ff);
                font-family: Arial, Helvetica, sans-serif;
            }

            .boxLogin {
                background-color: white;
                width: 350px;
                height: 400px;
                border-radius: 8px;
                margin: 30px auto;
                padding: 20px;
            }

            h3, p {
                text-align: center;
                margin-bottom: 10px;
            }

            #email, #senha {
                width: 100%;
                margin-bottom: 10px;
                padding: 8px;
            }

            button {
                width: 100%;
                padding: 8px;
                margin-top: 10px;
                background-color: blue;
                color: white;
                border-radius: 5px;
                border: none;
                cursor: pointer;
            }

            .bi-lock-fill {
                font-size: 50px;
                color: blue;
                text-align: center;
                display: block;
                margin-bottom: 20px;
            }
        </style>
    </head>
    <body>
        <div class="boxLogin">
            <i class="bi bi-lock-fill"></i>

            <h3>Login</h3>
            <p>Sistema de Autenticação</p>

            <div>
                <label for="email">E-mail:</label>
                <input type="text" id="email">
            </div>
            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha">
            </div>
            <div>
                <input type="checkbox" id="termoDeUso"> <label for="termoDeUso">Li e concordo com os termos de uso</label>
            </div>
            <div>
                <button type="button" onclick="logar()">Entrar</button>
            </div>
        </div>

        <script>

            //Simulacao de um banco de dados com uma lista de objetos
            let usuarios = [
                { nome: "Renato", email: "renato@email.com", senha: "re123456" },
                { nome: "Felipe", email: "felipe@email.com", senha: "fe123456" },
                { nome: "Maria", email: "maria@email.com", senha: "ma123456" }
            ];


            function logar() {
                let email = document.querySelector('#email').value;
                let senha = document.querySelector('#senha').value;
                let termoDeUso = document.querySelector('#termoDeUso').checked;

                if ( email == '' ) {
                    alert("O campo E-mail é obrigatório!");
                    return;
                }

                if( senha == '') {
                    alert("O campo Senha é obrigatório!");
                    return;
                }

                if ( termoDeUso == false  ) {
                    alert("Você deve concordar com os termo de uso para logar!");
                    return;
                }

                let usuarioEncontrado = usuarios.find(item => {
                    return item.email == email && item.senha == senha
                })

                //verificando se o usuário foi encontrado
                if ( usuarioEncontrado) {
                    //alert("Usuário logado com sucesso!");
                    window.location.href = "home.html";
                }
                else {
                    alert("E-mail ou senha estão incorretos!");
                }

            }
        </script>
    </body>
</html>
